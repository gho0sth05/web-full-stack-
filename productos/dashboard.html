<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonStore - Central</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        header { background: rgba(11, 8, 19, 0.85); border-bottom: 1px solid rgba(157, 78, 221, 0.3); backdrop-filter: blur(10px); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        header h2 { margin: 0; font-size: 20px; letter-spacing: 1px; text-shadow: 0 0 10px var(--blue-neon); }
        .user-status { display: flex; align-items: center; gap: 20px; }
        #user-display { font-size: 13px; color: var(--text-muted); }
        #user-display span { color: var(--blue-neon); font-weight: bold; }
        .btn-logout { background: transparent; border: 1px solid var(--magenta-glow); color: var(--magenta-glow); padding: 8px 16px; border-radius: 4px; font-size: 11px; text-transform: uppercase; }
        .btn-logout:hover { background: var(--magenta-glow); color: #fff; box-shadow: 0 0 15px var(--magenta-glow); }
        
        .dashboard-container { max-width: 1400px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 400px 1fr; gap: 30px; }
        @media (max-width: 900px) { .dashboard-container { grid-template-columns: 1fr; } }
        
        .control-panel { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .control-panel input { flex: 1; min-width: 200px; }
        .control-panel select { width: 180px; }
        .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .prod-card { background: rgba(25, 20, 44, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 6px; padding: 20px; position: relative; }
        .prod-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 3px; text-transform: uppercase; font-weight: bold; }
        .badge.instock { background: rgba(0, 240, 255, 0.15); color: var(--blue-neon); border: 1px solid var(--blue-neon); }
        .badge.outstock { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid #ef4444; }
        .prod-price { font-size: 20px; font-family: 'Syne', sans-serif; color: #fff; margin: 15px 0 5px; }
        .action-block { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; }
        .action-block button { flex: 1; padding: 6px; font-size: 11px; }
        
        /* Historial de Pedidos Estilo Tabla Terminal */
        .historial-seccion { margin-top: 30px; border-top: 2px dashed rgba(157, 78, 221, 0.3); padding-top: 30px; }
        .tabla-cyber { width: 100%; border-collapse: collapse; background: rgba(20, 16, 35, 0.5); font-size: 13px; }
        .tabla-cyber th, .tabla-cyber td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tabla-cyber th { color: var(--blue-neon); text-transform: uppercase; font-family: 'Syne', sans-serif; }
        #global-alert { display: none; position: fixed; top: 25px; right: 25px; z-index: 1000; }
    </style>
</head>
<body>
    <div id="global-alert"></div>
    <header>
        <h2>NEONSTORE // HUB</h2>
        <div class="user-status">
            <div id="user-display">CARGANDO...</div>
            <button class="btn-logout" id="btn-logout">Desconectar</button>
        </div>
    </header>

    <div class="dashboard-container">
        <div style="display: flex; flex-direction: column; gap: 30px;">
            <div class="cyber-card" id="modulo-escritura">
                <h3 id="form-titulo">Registrar Producto</h3>
                <form id="producto-form">
                    <input type="hidden" id="prod-id">
                    <div class="form-group"><label>Nombre del Producto</label><input type="text" id="prod-nombre" required></div>
                    <div class="form-group"><label>Categoría</label>
                        <select id="prod-categoria">
                            <option value="Hardware">Hardware</option>
                            <option value="Periféricos">Periféricos</option>
                            <option value="Iluminación">Iluminación</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Precio Unitario ($)</label><input type="number" id="prod-precio" min="1" required></div>
                    <div class="form-group"><label>Stock Inicial</label><input type="number" id="prod-stock" min="0" required></div>
                    <div class="form-group"><label>Descripción</label><textarea id="prod-descripcion" rows="2"></textarea></div>
                    <button type="submit" class="btn-submit" id="btn-form-action">Inyectar Producto</button>
                </form>
            </div>

            <div class="cyber-card">
                <h3>Apartar / Despachar Producto</h3>
                <form id="pedido-form">
                    <div class="form-group">
                        <label>Seleccionar Producto Disponible</label>
                        <select id="pedido-select-producto" required>
                            <option value="">Cargando catálogo...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Cantidad a Solicitar</label>
                        <input type="number" id="pedido-cantidad" min="1" value="1" required>
                    </div>
                    <button type="submit" class="btn-submit" style="background: linear-gradient(135deg, var(--blue-neon), var(--purple-neon)); box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);">Procesar Pedido</button>
                </form>
            </div>
        </div>

        <div>
            <div class="control-panel">
                <input type="text" id="search-bar" placeholder="Buscar producto...">
                <select id="filter-stock">
                    <option value="TODOS">Todos</option>
                    <option value="DISPONIBLE">En Stock</option>
                    <option value="AGOTADO">Agotados</option>
                </select>
            </div>

            <h3>Catálogo Global de Inventario</h3>
            <div class="productos-grid" id="lista-productos"></div>

            <div class="historial-seccion">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Historial de Movimientos y Pedidos Personales</h3>
                <table class="tabla-cyber">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Operario</th>
                            <th>Producto</th>
                            <th>Cant.</th>
                            <th>Estado Transacción</th>
                        </tr>
                    </thead>
                    <tbody id="lista-pedidos">
                        <tr><td colspan="5" style="color: var(--text-muted);">No hay transacciones registradas.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
